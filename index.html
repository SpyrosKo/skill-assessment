<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <p class="demo">Hello world</p>


    <script>
      const demo = document.querySelector(".demo");
      demo.textContent = "demo 1st update";
      console.log(demo.firstChild);
      console.log(demo.textContent);

      const d = document.createTextNode("ass");
      demo.appendChild(d)
      console.log(demo);
      console.log(demo.childNodes)
      console.log(demo.childNodes[0])
      console.log(demo.childNodes[1].textContent + demo.childNodes[0].textContent);
      console.log(demo.removeChild(demo.childNodes[1]));
      console.log(demo.removeChild(demo.childNodes[0]));
      console.log(demo.childNodes);
      demo.textContent = "";
      console.log(demo.childNodes);
      demo.textContent = "ABC";
      demo.childNodes;
      demo.removeChild(demo.childNodes[0]);


      const span = document.createElement("span");
      span.textContent = "Anything I want";
      demo.appendChild(span);
      console.log(span.childNodes);
      console.log(demo)
      demo.appendChild("a")

    </script>
    
    <script src="app.js"></script>
  </body>
</html>
